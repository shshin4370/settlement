name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: settlement
  IMAGE_TAG: latest
  PYTHON_VERSION: "3.11"

jobs:
  ci:

    runs-on:
      - self-hosted
      - settlement

    permissions:
      contents: read
      security-events: write

    steps:

    #####################################################
    # Checkout
    #####################################################

    - name: Checkout source
      uses: actions/checkout@v4

    #####################################################
    # Python
    #####################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip

    #####################################################
    # Install
    #####################################################

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip

        pip install -r requirements.txt

        pip install \
          pytest \
          pytest-cov \
          ruff \
          black

    #####################################################
    # Ruff
    #####################################################

    - name: Ruff Lint
      run: |
        ruff check .

    #####################################################
    # Black
    #####################################################

    - name: Black Format Check
      run: |
        black --check .

    #####################################################
    # Pytest
    #####################################################

    - name: Run Pytest
      run: |
        pytest \
          --cov=src \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-fail-under=80

    #####################################################
    # Docker Build
    #####################################################

    - name: Build Docker Image
      run: |
        docker build \
          -t ${IMAGE_NAME}:${IMAGE_TAG} .

    #####################################################
    # Trivy
    #####################################################

    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@v0
      with:
        image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
        format: table
        severity: CRITICAL
        ignore-unfixed: true
        exit-code: "1"

    #####################################################
    # Coverage
    #####################################################

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
